services:
  # =========================================
  # 1. MySQL (数据库)
  # =========================================
  mysql:
    image: mysql:8.0
    container_name: mysql-media
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=media_db
      - TZ=Asia/Shanghai
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - E:/MySQL/data:/var/lib/mysql
      - E:/MySQL/logs:/var/log/mysql
    networks:
      - my-network
    restart: unless-stopped

  # =========================================
  # 2. Redis (缓存 & 分布式锁)
  # =========================================
  redis:
    image: redis:7
    container_name: redis-media
    ports:
      - "6379:6379"
    volumes:
      - E:/Redis/data:/data
    command: redis-server --appendonly yes
    networks:
      - my-network
    restart: unless-stopped

  # =========================================
  # 3. MinIO (对象存储)
  # =========================================
  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"  # API 端口
      - "9001:9001"  # 控制台端口
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - E:/MinIO/data:/data
    networks:
      - my-network

  # =========================================
  # 4. RocketMQ NameServer
  # =========================================
  rmqnamesrv:
    image: apache/rocketmq:4.9.4
    container_name: rmqnamesrv
    ports:
      - 19876:9876
    environment:
      - JAVA_OPT_EXT=-server -Xms256m -Xmx256m -Xmn128m
    command: sh mqnamesrv
    networks:
      - my-network

  # =========================================
  # 5. RocketMQ Broker
  # =========================================
  rmqbroker:
    image: apache/rocketmq:4.9.4
    container_name: rmqbroker
    ports:
      - 10911:10911
      - 10909:10909
    environment:
      - NAMESRV_ADDR=rmqnamesrv:9876
      - BROKER_ID=0
      - BROKER_ROLE=ASYNC_MASTER
      - JAVA_OPT_EXT=-server -Xms256m -Xmx256m -Xmn128m
    volumes:
      - ./rocketmq/broker.conf:/opt/rocketmq-4.9.4/conf/broker.conf
    command: sh mqbroker -n rmqnamesrv:9876 -c /opt/rocketmq-4.9.4/conf/broker.conf
    depends_on:
      - rmqnamesrv
    networks:
      - my-network

  # =========================================
  # 6. RocketMQ Dashboard (可视化控制台)
  # =========================================
  rmqdashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    container_name: rmqdashboard
    ports:
      - 28080:8080
    environment:
      - JAVA_OPTS=-Drocketmq.namesrv.addr=rmqnamesrv:9876 -Dserver.port=8080
    depends_on:
      - rmqnamesrv
    networks:
      - my-network

networks:
  my-network:
    name: my-network
    driver: bridge
